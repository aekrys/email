{% extends "email_app/base.html" %}
{% block title %}Новое письмо{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Новое письмо</h1>
</div>

<div class="form-group">
    <form method="post">
        {% csrf_token %}
        <input type="email" name="sender" placeholder="От кого" value="{{ user.email|default:user.username }}" required>
        <input type="email" name="recipient" placeholder="Кому" required>
        <input type="text" name="topic" placeholder="Тема" required>
        <textarea name="text" placeholder="Текст письма..." required></textarea>
        
        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
            <a href="{% url 'inbox' %}" class="btn btn-danger">Отмена</a>
            <button type="submit" class="btn">Отправить</button>
        </div>
    </form>
</div>
{% endblock %}
