{% extends "email_app/base.html" %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
    <h1 style="margin-bottom: 2rem;">Регистрация</h1>
    
    <div class="form-group">
        <form method="post">
            {% csrf_token %}
            
            <div style="margin-bottom: 1.5rem;">
                <label style="color: #8b949e; display: block; margin-bottom: 0.5rem;">Имя пользователя</label>
                <input type="text" name="username" required 
                       style="width: 100%; padding: 0.8rem; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9;">
                <small style="color: #6e7681;">Только буквы, цифры и @/./+/-/_</small>
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <label style="color: #8b949e; display: block; margin-bottom: 0.5rem;">Пароль</label>
                <input type="password" name="password1" required 
                       style="width: 100%; padding: 0.8rem; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9;">
            </div>
            
            <div style="margin-bottom: 2rem;">
                <label style="color: #8b949e; display: block; margin-bottom: 0.5rem;">Подтверждение пароля</label>
                <input type="password" name="password2" required 
                       style="width: 100%; padding: 0.8rem; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9;">
            </div>
            
            <button type="submit" class="btn" style="width: 100%;">Зарегистрироваться</button>
        </form>
    </div>
    
    <p style="text-align: center; margin-top: 2rem; color: #8b949e;">
        Уже есть аккаунт? <a href="{% url 'login' %}" style="color: #58a6ff; text-decoration: none;">Войти</a>
    </p>
</div>
{% endblock %}
