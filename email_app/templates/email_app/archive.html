{% extends "email_app/base.html" %}
{% block title %}Архив{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Архив</h1>
    <span class="email-count">{{ emails|length }} писем</span>
</div>

<div class="email-list">
    {% for email in emails %}
    <div class="email-item">
        <div class="email-sender">{{ email.sender }}</div>
        <div class="email-subject">
            <a href="{% url 'open_email' email.id %}">{{ email.topic }}</a>
        </div>
        <div class="email-date">{{ email.date_time|date:"d.m.Y H:i" }}</div>
        <div class="email-actions">
            <a href="{% url 'delete_email' email.id %}" class="btn btn-danger">🗑</a>
        </div>
    </div>
    {% empty %}
    <div style="text-align: center; padding: 3rem; color: #8b949e;">
        В архиве нет писем
    </div>
    {% endfor %}
</div>
{% endblock %}
